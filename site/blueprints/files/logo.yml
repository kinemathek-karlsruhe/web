title: Logo

accept:
  mime:
    - image/png
    - image/svg+xml
    - image/jpeg
    - image/webp

fields:
  alt:
    label: Alt-Text / Name
    type: text
    icon: title
    help: Name des Partners oder kurze Bildbeschreibung (für Barrierefreiheit).
  link:
    label: Link (optional)
    type: url
    icon: url
    help: Wenn das Logo anklickbar sein soll — z.B. zur Website des Partners.
