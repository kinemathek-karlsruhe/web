title: Veranstaltung
icon: megaphone

# Standalone, non-film programming (SPEC §2.3): a lecture, talk, festival item
# without a single attached film. Reuses the Showing occurrence mechanics but
# has NO film link, and lives under events/ so it never reaches the archive.
num: "{{ page.date.toDate('YmdHi') }}"

# Header: surface the date prominently (categories shown in the sidebar facet).
info: "{{ page.date.toDate('d.m.Y H:i') }} Uhr"
image:
  query: page.image.toFile
  back: pattern
  cover: true

columns:

  # Main column: what it is, when, and the description.
  main:
    width: 2/3
    sections:

      kopf:
        type: fields
        fields:
          title:
            label: Titel
            type: text
            required: true
            icon: title

      termin:
        type: fields
        fields:
          terminHeadline:
            label: Termin
            type: headline
          date:
            label: Datum & Uhrzeit
            type: date
            time: true
            required: true
            display: DD.MM.YYYY
            icon: calendar
            width: 1/2
          endDate:
            label: Ende (optional, mehrtägig)
            type: date
            time: true
            display: DD.MM.YYYY
            icon: calendar
            width: 1/2
            help: Nur bei mehrtägigen Veranstaltungen ausfüllen.
          venue:
            label: Ort
            type: text
            icon: pin
            width: 1/2
          hasDiscussion:
            label: Mit Gespräch
            type: toggle
            text:
              - "Nein"
              - "Ja"
            width: 1/2

      inhalt:
        type: fields
        fields:
          inhaltHeadline:
            label: Inhalt
            type: headline
          text:
            label: Beschreibung
            type: textarea
            size: large
            icon: text
          ticketUrl:
            label: Ticket-Link
            type: url
            icon: ticket
            help: Externer Link. Keine Zahlung / kein iframe auf der Website (SPEC §6).

  # Sidebar: routing/facets and the key visual.
  sidebar:
    width: 1/3
    sections:

      platzierung:
        type: fields
        fields:
          platzierungHeadline:
            label: Platzierung
            type: headline
          platzierungInfo:
            type: info
            text: >
              Steuert, **wo** die Veranstaltung auftaucht (SPEC §2.4) — getrennt
              von den beschreibenden Schlagworten.
          categories:
            label: Platzierung
            type: multiselect
            options:
              spielplan: Spielplan
              koop: Kooperation
              festival: Festival
              filmbildung: Filmbildung
          subtitles:
            label: Untertitel / Fassung
            type: multiselect
            icon: globe
            options:
              OmU: OmU
              OmeU: OmeU
              OF: Originalfassung
              dtF: dt. Fassung
            help: Nur falls ein Film/Medium gezeigt wird.
          keywords:
            label: Schlagworte
            type: tags
            icon: tag

      medien:
        type: fields
        fields:
          medienHeadline:
            label: Bild
            type: headline
          image:
            label: Bild
            type: files
            max: 1
            multiple: false
            layout: cards
            query: page.images
            help: Schlüsselbild für die Programm-Ansicht.
