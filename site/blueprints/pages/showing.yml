title: Vorstellung
icon: calendar

# A dated screening of exactly one Film (SPEC §2.2). One Film -> many Showings.
# The relationship is stored here (the "many" side) in the `film` field.
# `num` encodes date+time so the Panel lists showings chronologically.
num: "{{ page.date.toDate('YmdHi') }}"

# Header: the film + when it runs are what an editor scans for. The model
# exposes displayTitle()/film(); date drives everything.
info: "{{ page.date.toDate('d.m.Y H:i') }} Uhr"
image:
  query: page.film.toPage.poster.toFile
  back: pattern
  cover: true

columns:

  # Main column: what plays, when, and the editorial extras.
  main:
    width: 2/3
    sections:

      verknuepfung:
        type: fields
        fields:
          film:
            label: Film
            type: pages
            required: true
            max: 1
            multiple: false
            query: site.find("films").children
            image:
              query: page.poster.toFile
              cover: true
            info: "{{ page.year }}"
            icon: video
            help: Verknüpfter Film (Pflicht). Nur Filme aus dem Archiv.
          title:
            label: Abweichender Titel (optional)
            type: text
            icon: title
            help: Leer lassen — fällt automatisch auf den Filmtitel zurück.

      termin:
        type: fields
        fields:
          terminHeadline:
            label: Termin
            type: headline
          date:
            label: Datum & Uhrzeit
            type: date
            time: true
            required: true
            display: DD.MM.YYYY
            icon: calendar
            width: 1/2
          venue:
            label: Ort / Saal
            type: text
            icon: pin
            width: 1/2

      extras:
        type: fields
        fields:
          extrasHeadline:
            label: Zusatzinfos
            type: headline
          sonderinfo:
            label: Sonderinfo
            type: textarea
            icon: text
            help: Einführung, Gast, „mit Filmgespräch" + mit wem, etc.
          ticketUrl:
            label: Ticket-Link (Mars EDV)
            type: url
            icon: ticket
            help: Externer Link. Keine Zahlung / kein iframe auf der Website (SPEC §6).

  # Sidebar: per-occurrence facets and routing.
  sidebar:
    width: 1/3
    sections:

      fassung:
        type: fields
        fields:
          fassungHeadline:
            label: Fassung & Gespräch
            type: headline
          subtitles:
            label: Untertitel / Fassung
            type: multiselect
            icon: globe
            # Per-occurrence facet — can differ per showing (SPEC §2.2).
            options:
              OmU: OmU
              OmeU: OmeU
              OF: Originalfassung
              dtF: dt. Fassung
            help: Kann sich je Vorstellung unterscheiden.
          hasDiscussion:
            label: Mit Filmgespräch
            type: toggle
            text:
              - "Nein"
              - "Ja"

      platzierung:
        type: fields
        fields:
          platzierungHeadline:
            label: Platzierung
            type: headline
          platzierungInfo:
            type: info
            text: >
              Steuert, **wo** diese Vorstellung auftaucht (SPEC §2.4) — nicht zu
              verwechseln mit den beschreibenden Schlagworten.
          categories:
            label: Platzierung
            type: multiselect
            # Placement / routing — controls WHERE this surfaces (SPEC §2.4).
            options:
              spielplan: Spielplan
              koop: Kooperation
              festival: Festival
              filmbildung: Filmbildung
          keywords:
            label: Schlagworte
            type: tags
            icon: tag
