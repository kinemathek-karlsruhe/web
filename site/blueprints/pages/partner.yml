title: Partner / Logos
icon: image

description: >-
  Seite mit Text links und Logos oder Bilder rechts — z.B. für Förderer,
  Partner, Sponsoren.

status:
  draft: Entwurf
  unlisted: Versteckt (nur per Link erreichbar)
  listed: Im Seitenmenü (Pivot-Navigation)

options:
  template:
    - text

tabs:

  inhalt:
    label: Inhalt
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          content:
            type: fields
            fields:
              intro:
                label: Einleitung
                type: textarea
                size: medium
                icon: text
                help: Kurzer Einleitungstext oben (wird größer dargestellt).
              text:
                label: Text
                type: textarea
                size: large
                icon: text
                help: Haupttext der Seite (Kirbytext — Markdown möglich).

      sidebar:
        width: 1/3
        sections:
          logosinfo:
            type: fields
            fields:
              logosHeadline:
                label: Logos / Bilder (rechte Spalte)
                type: headline
              logosHint:
                type: info
                text: >
                  Die Logos erscheinen rechts neben dem Text. Per Drag-and-drop
                  sortierbar. Empfohlene Formate: PNG mit Transparenz oder SVG.
              logos:
                label: Logos
                type: files
                layout: cards
                translate: false
                multiple: true
                uploads:
                  template: logo
                help: >
                  Bilder hochladen und sortieren. Alt-Text im Bild-Panel pflegen.

  optionen:
    label: Optionen
    icon: settings
    sections:
      opts:
        type: fields
        fields:
          logoColumns:
            label: Logos pro Zeile
            type: select
            translate: false
            default: "2"
            options:
              - value: "1"
                text: "1 Logo pro Zeile"
              - value: "2"
                text: "2 Logos pro Zeile"
              - value: "3"
                text: "3 Logos pro Zeile"
