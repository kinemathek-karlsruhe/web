title: Bereichsseite
icon: dashboard

description: >-
  Bereichs-Startseite (z. B. Festivals, Filmbildung) — Einleitung, dann
  automatisch alle kommenden Programmpunkte der gewählten Kategorien,
  darunter optional weitere Unterseiten und Text.

options:
  template:
    - text
    - custom

status:
  draft: Entwurf
  unlisted: Versteckt (nur per Link erreichbar)
  listed: Im Seitenmenü (Pivot-Navigation)

columns:

  # ── Hauptspalte (2/3) ────────────────────────────────────────────────────
  main:
    width: 2/3
    sections:

      content:
        type: fields
        fields:
          intro:
            label: Einleitung
            type: textarea
            size: small
          categories:
            label: Programm-Kategorien
            type: multiselect
            translate: false
            options:
              spielplan: Spielplan
              koop: Koop
              festival: Festival
              filmbildung: Filmbildung
            help: >-
              Kommende Vorstellungen/Events mit diesen Kategorien erscheinen
              automatisch unter der Einleitung.
          text:
            label: Weiterer Text
            type: textarea
            size: large

      # Optional pre-filters: narrow the automatic listing above to matching
      # showings/films. Read generically in the controller by facet name
      # (filterSeries -> the "series"/Reihe facet in Kinemathek::FACETS), then
      # run through the same filterByFacets() as the Spielplan's query-string
      # facets. AND across fields, OR within one. ALL pre-filters are
      # translate: false: they are editorial routing config, not descriptive
      # content, so one value governs both languages. (The matching facet
      # fields on the film/showing stay translatable and fall back to German
      # when untranslated, so a German filter value still matches on /en.)
      # A translatable pre-filter used to shadow the German value with an empty
      # string in the .en.txt and silently emptied the /en listing.
      vorfilter:
        type: fields
        fields:
          filterInfo:
            type: info
            text: >-
              Optional: schränkt die automatische Programmliste oben zusätzlich
              auf passende Vorstellungen ein – z. B. nur eine bestimmte Reihe.
              Mehrere Felder wirken zusammen (UND), mehrere Werte in einem Feld
              als ODER. Leer lassen = keine zusätzliche Einschränkung.
          filterSeries:
            label: Reihe
            type: tags
            translate: false
            icon: layers
            width: 1/1
            options:
              type: query
              query: 'site.facetOptions("series")'
          filterGenre:
            label: Genre
            type: tags
            translate: false
            icon: tag
            width: 1/2
            options:
              type: query
              query: 'site.facetOptions("genre")'
          filterKeywords:
            label: Schlagworte
            type: tags
            translate: false
            icon: tag
            width: 1/2
            options:
              type: query
              query: 'site.facetOptions("keywords")'
          filterCountry:
            label: Land
            type: tags
            translate: false
            icon: flag
            width: 1/2
            options:
              type: query
              query: 'site.facetOptions("country")'
          filterLanguage:
            label: Originalsprache
            type: tags
            translate: false
            icon: globe
            width: 1/2
            options:
              type: query
              query: 'site.facetOptions("language")'
          filterSubtitles:
            label: Untertitel / Fassung
            type: multiselect
            translate: false
            icon: globe
            width: 1/2
            options:
              OmU: OmU
              OmeU: OmeU
              OF: Originalfassung
              dtF: dt. Fassung
          filterDiscussion:
            label: Mit Filmgespräch
            type: toggle
            translate: false
            width: 1/2

      subpages:
        type: pages
        label: Unterseiten

  # ── Seitenleiste (1/3) — Bilder im Cards-Format ──────────────────────────
  sidebar:
    width: 1/3
    sections:
      bilder:
        type: fields
        fields:
          bilderHeadline:
            label: Bilder
            type: headline
          bilder:
            label: Bilder
            type: files
            layout: cards          # Karten-Ansicht
            multiple: true         # mehrere Bilder erlaubt
            translate: false       # ein Bildersatz für alle Sprachen
            uploads:
              template: bild
